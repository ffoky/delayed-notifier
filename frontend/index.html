<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DelayedNotifier</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<div id="authScreen" class="screen">
  <div class="auth-card">
    <h1>DelayedNotifier</h1>
    <p class="subtitle">Войдите чтобы управлять уведомлениями</p>
    <div class="tab-row">
      <button class="tab active" onclick="switchTab('email')">Email</button>
      <button class="tab" onclick="switchTab('telegram')">Telegram</button>
    </div>
    <div id="tabEmail">
      <div class="form-group">
        <label>Email адрес</label>
        <input type="email" id="authEmail" placeholder="you@example.com" />
      </div>
    </div>
    <div id="tabTelegram" style="display:none">
      <div class="form-group">
        <label>Telegram ID</label>
        <input type="number" id="authTelegram" placeholder="993309493" />
      </div>
      <p class="hint">Узнать свой ID: напишите <a href="https://t.me/userinfobot" target="_blank">@userinfobot</a> в Telegram</p>
    </div>
    <button class="btn btn-primary full-width" onclick="doAuth()">Войти / Зарегистрироваться</button>
    <span id="authMsg" class="msg"></span>
  </div>
</div>

<div id="appScreen" class="screen" style="display:none">
  <div class="topbar">
    <h1>DelayedNotifier</h1>
    <div class="user-info">
      <span id="userLabel"></span>
      <button class="btn btn-sm" onclick="logout()">Выйти</button>
    </div>
  </div>

  <div class="card">
    <h2>Создать уведомление</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Канал</label>
        <select id="channel">
          <option value="telegram">Telegram</option>
          <option value="email">Email</option>
        </select>
      </div>
      <div class="form-group">
        <label>Время отправки</label>
        <input type="datetime-local" id="plannedAt" />
      </div>
      <div class="form-group full">
        <label>Текст</label>
        <textarea id="notifText" placeholder="Текст уведомления..."></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="createNotification()">Создать</button>
      <span id="createMsg" class="msg"></span>
    </div>
  </div>

  <div class="card">
    <div class="list-header">
      <h2>Уведомления</h2>
      <span class="refresh-info" id="refreshInfo">Обновление каждые 3с</span>
    </div>
    <div id="tableWrap"><div class="empty">Загрузка...</div></div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
